name: Release

on:
  push:
    tags:
      - 'v*'
  # Позволяет запускать руками из UI (Actions → Release → Run workflow).
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (без префикса v, например 0.2.0)'
        required: true
        type: string

permissions:
  contents: write  # для создания релиза

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # нужно для генерации release notes по коммитам

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF##*/}"
            VERSION="${VERSION#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync package.json version
        # Подставляем версию из тега в package.json — WXT берёт её для манифеста.
        run: npm version "${{ steps.version.outputs.VERSION }}" --no-git-tag-version --allow-same-version

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Configure production env
        # Берём URL бэкенда из repo variable и кладём в .env.production
        # (файл в gitignore, в репо его нет). Падаем рано, если переменная не задана.
        run: |
          if [ -z "${{ vars.WXT_BACKEND_URL }}" ]; then
            echo "::error::WXT_BACKEND_URL is missing in repo variables."
            echo "Add it under Settings → Secrets and variables → Actions → Variables."
            echo "Example: https://test-sm.zebaro.dev"
            exit 1
          fi
          echo "WXT_BACKEND_URL=${{ vars.WXT_BACKEND_URL }}" > .env.production
          echo "Generated .env.production:"
          cat .env.production

      - name: Build Chrome (.zip)
        run: npx wxt zip --browser chrome
        env:
          NODE_ENV: production

      - name: Build Firefox (.zip + sources)
        run: npx wxt zip --browser firefox
        env:
          NODE_ENV: production

      - name: List artifacts
        run: ls -la .output/

      - name: Publish to Chrome Web Store (trusted testers)
        # Авто-загрузка обновления в Web Store для тестеров (ты + друзья) на каждый тег v*.
        # Публичный листинг — вручную: сменить publishTarget на 'default' и пройти ревью.
        # Шаг ПРОПУСКАЕТСЯ, если секреты не заданы (релиз с zip'ами всё равно создастся).
        # Нужны secrets: CHROME_EXTENSION_ID, CHROME_CLIENT_ID, CHROME_CLIENT_SECRET, CHROME_REFRESH_TOKEN.
        env:
          CWS_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CWS_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        # Запускается ТОЛЬКО если заданы все 4 секрета — иначе шаг пропускается (релиз не падает).
        if: ${{ env.CWS_EXTENSION_ID != '' && env.CWS_CLIENT_ID != '' && env.CWS_CLIENT_SECRET != '' && env.CWS_REFRESH_TOKEN != '' }}
        run: |
          set -euo pipefail
          ZIP=$(ls .output/*-chrome.zip | head -n1)
          echo "Chrome Web Store: item=$CWS_EXTENSION_ID zip=$ZIP"
          ACCESS_TOKEN=$(curl -sS -X POST https://oauth2.googleapis.com/token \
            -d client_id="$CWS_CLIENT_ID" \
            -d client_secret="$CWS_CLIENT_SECRET" \
            -d refresh_token="$CWS_REFRESH_TOKEN" \
            -d grant_type=refresh_token | jq -r .access_token)
          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "::error::Не удалось получить access_token (проверь CHROME_CLIENT_ID/SECRET/REFRESH_TOKEN)"; exit 1
          fi
          echo "Uploading package…"
          UP=$(curl -sS -X PUT -T "$ZIP" \
            -H "Authorization: Bearer $ACCESS_TOKEN" -H "x-goog-api-version: 2" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/$CWS_EXTENSION_ID?uploadType=media")
          echo "$UP"
          echo "$UP" | jq -e '.uploadState=="SUCCESS"' >/dev/null \
            || { echo "::error::upload failed (см. itemError выше)"; exit 1; }
          echo "Publishing to trusted testers…"
          PUB=$(curl -sS -X POST -H "Content-Length: 0" \
            -H "Authorization: Bearer $ACCESS_TOKEN" -H "x-goog-api-version: 2" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/$CWS_EXTENSION_ID/publish?publishTarget=trustedTesters")
          echo "$PUB"
          echo "$PUB" | jq -e '.status | index("OK") != null' >/dev/null \
            || echo "::warning::publish вернул не-OK статус — возможно, версия ушла на ревью (это нормально для нового пакета/новых разрешений)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            .output/*.zip
