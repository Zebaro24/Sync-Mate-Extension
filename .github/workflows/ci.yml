name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx wxt prepare
      - run: npx tsc --noEmit

  arch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      # Вендорная копия workspace scripts/arch_lint_ext.py (stdlib, без зависимостей).
      - run: python scripts/arch_lint.py

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run prepare
      - run: npm test

  build:
    runs-on: ubuntu-latest
    env:
      # Заглушка: сборке нужен непустой WXT_BACKEND_URL (реальный URL подставляется в release.yml).
      WXT_BACKEND_URL: https://example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Audit production dependencies (high+)
        # Бесплатный аудит зависимостей расширения. Скоуп — прод-deps (--omit=dev),
        # порог high+ (dev-тулинг типа node-notifier/uuid не валит CI).
        run: npm audit --omit=dev --audit-level=high
